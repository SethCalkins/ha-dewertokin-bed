# ╔══════════════════════════════════════════════════════════════╗
# ║  DewertOkin Bed Remote — Lovelace Dashboard Card           ║
# ╠══════════════════════════════════════════════════════════════╣
# ║                                                            ║
# ║  DEPENDENCIES (install via HACS → Frontend):               ║
# ║    • button-card                                           ║
# ║    • stack-in-card                                         ║
# ║    • Mushroom                                              ║
# ║    • card-mod                                              ║
# ║                                                            ║
# ║  ENTITY IDs: Replace "DEVICE" below with your actual       ║
# ║  device slug (check Settings → Devices → your bed).        ║
# ║  Example: star254202048066                                 ║
# ║                                                            ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Find & Replace: Change "DEVICE" to your device slug ──────
# e.g.  :%s/DEVICE/star254202048066/g

type: custom:stack-in-card
mode: vertical
keep:
  margin: false
  box_shadow: false
  border_radius: true
  background: true
  outer_padding: false
card_mod:
  style: |
    ha-card {
      background: linear-gradient(160deg, #1a1d2e 0%, #12141f 100%);
      border-radius: 28px;
      padding: 20px 12px 24px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
cards:

  # ═══════════════════════════════════════════════
  #  HEADER — icon + title left, connection dot right
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    entity: binary_sensor.DEVICE_connected
    show_entity_picture: false
    show_state: false
    show_name: false
    show_icon: false
    tap_action:
      action: none
    custom_fields:
      header: |
        [[[
          const on = entity && entity.state === 'on';
          const dotColor = on ? '#34d399' : 'rgba(255,255,255,0.2)';
          return `
            <div style="
              display:flex; align-items:center; justify-content:space-between;
              width:100%; padding:0 4px;
            ">
              <div style="display:flex; align-items:center; gap:12px;">
                <ha-icon icon="mdi:bed-king-outline" style="
                  --mdc-icon-size:28px; color:rgba(100,160,255,0.5);
                "></ha-icon>
                <span style="
                  font-size:20px; font-weight:500; color:rgba(255,255,255,0.85);
                  letter-spacing:0.5px;
                ">Adjustable Bed</span>
              </div>
              <div style="
                width:12px; height:12px; border-radius:50%;
                background:${dotColor};
                box-shadow: 0 0 ${on ? '8px' : '0'} ${dotColor};
                transition: all 0.4s ease;
              "></div>
            </div>`;
        ]]]
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 16px 12px 8px
      custom_fields:
        header:
          - width: 100%

  # ═══════════════════════════════════════════════
  #  BED VISUALIZATION — SVG side-profile
  #  Segments pivot at joints; head lifts left,
  #  foot lifts right, core raises whole platform
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    entity: number.DEVICE_head_position
    triggers_update:
      - number.DEVICE_head_position
      - number.DEVICE_foot_position
      - number.DEVICE_core_position
      - binary_sensor.DEVICE_moving
    show_name: false
    show_icon: false
    show_state: false
    tap_action:
      action: none
    custom_fields:
      bed: |
        [[[
          const head = states['number.DEVICE_head_position']
            ? parseFloat(states['number.DEVICE_head_position'].state) : 0;
          const foot = states['number.DEVICE_foot_position']
            ? parseFloat(states['number.DEVICE_foot_position'].state) : 0;
          const core = states['number.DEVICE_core_position']
            ? parseFloat(states['number.DEVICE_core_position'].state) : 0;
          const moving = states['binary_sensor.DEVICE_moving']
            ? states['binary_sensor.DEVICE_moving'].state === 'on' : false;

          // Angles: head 0→-50°, foot 0→35°
          const hA = (head / 100) * -50;
          const fA = (foot / 100) * 35;
          const cY = (core / 100) * 12;
          const pulse = moving
            ? 'animation: bedPulse 2s ease-in-out infinite;' : '';

          // Bed color
          const c = '79,163,221';  // nice bed blue

          return `
          <style>
            @keyframes bedPulse {
              0%,100% { filter: drop-shadow(0 0 4px rgba(${c},0.3)); }
              50%     { filter: drop-shadow(0 0 12px rgba(${c},0.6)); }
            }
          </style>
          <div style="
            display:flex; align-items:flex-end; justify-content:center;
            height:120px; padding:0 16px; ${pulse}
          ">
            <svg viewBox="0 0 300 100" style="width:100%; max-width:340px; overflow:visible;">
              <defs>
                <linearGradient id="bedGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="rgba(${c},0.9)" />
                  <stop offset="100%" stop-color="rgba(${c},0.55)" />
                </linearGradient>
                <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="rgba(${c},0.5)" />
                  <stop offset="100%" stop-color="rgba(${c},0.25)" />
                </linearGradient>
              </defs>

              <!-- === FRAME (static base) === -->
              <!-- Legs -->
              <rect x="32" y="82" width="5" height="14" rx="2"
                fill="url(#frameGrad)" />
              <rect x="263" y="82" width="5" height="14" rx="2"
                fill="url(#frameGrad)" />
              <!-- Wheels -->
              <circle cx="34" cy="97" r="3" fill="rgba(${c},0.3)" />
              <circle cx="266" cy="97" r="3" fill="rgba(${c},0.3)" />
              <!-- Base rail -->
              <rect x="28" y="78" width="244" height="6" rx="3"
                fill="url(#frameGrad)" />

              <!-- === MATTRESS PLATFORM (lifts with core) === -->
              <g transform="translate(0,${-cY})">
                <!-- Center mattress slab -->
                <rect x="40" y="58" width="220" height="22" rx="5"
                  fill="url(#bedGrad)" opacity="0.85" />

                <!-- Head section — pivots at x=150 (right edge of head zone) -->
                <g transform="rotate(${hA}, 148, 69)">
                  <rect x="38" y="52" width="112" height="18" rx="5"
                    fill="url(#bedGrad)" />
                  <!-- Pillow -->
                  <rect x="44" y="43" width="42" height="12" rx="6"
                    fill="rgba(${c},0.7)"
                    stroke="rgba(${c},0.9)" stroke-width="0.5" />
                </g>

                <!-- Foot section — pivots at x=152 (left edge of foot zone) -->
                <g transform="rotate(${fA}, 152, 69)">
                  <rect x="150" y="52" width="112" height="18" rx="5"
                    fill="url(#bedGrad)" />
                </g>
              </g>

              <!-- === LABELS === -->
              <text x="85" y="24" text-anchor="middle"
                font-size="10" font-weight="500" fill="rgba(255,255,255,0.4)"
                font-family="system-ui,sans-serif">
                Head ${Math.round(head)}%
              </text>
              <text x="150" y="24" text-anchor="middle"
                font-size="10" font-weight="500" fill="rgba(255,255,255,0.25)"
                font-family="system-ui,sans-serif">
                ${core > 0 ? 'Core ' + Math.round(core) + '%' : ''}
              </text>
              <text x="215" y="24" text-anchor="middle"
                font-size="10" font-weight="500" fill="rgba(255,255,255,0.4)"
                font-family="system-ui,sans-serif">
                Foot ${Math.round(foot)}%
              </text>
            </svg>
          </div>`;
        ]]]
    styles:
      card:
        - background: rgba(255,255,255,0.02)
        - border-radius: 18px
        - border: 1px solid rgba(255,255,255,0.04)
        - margin: 4px 4px 0
        - padding: 8px 0
        - box-shadow: none
      custom_fields:
        bed:
          - width: 100%

  # ═══════════════════════════════════════════════
  #  PRESETS
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    name: PRESETS
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 20px 16px 6px 16px
      name:
        - font-size: 10px
        - font-weight: 600
        - color: rgba(255,255,255,0.2)
        - letter-spacing: 3px
        - text-transform: uppercase
        - text-align: left

  - type: grid
    columns: 5
    square: false
    card_mod:
      style: |
        ha-card {
          background: transparent;
          box-shadow: none;
          padding: 0 4px;
        }
    cards:
      - type: custom:button-card
        entity: button.DEVICE_flat
        icon: mdi:bed-outline
        name: Flat
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        styles: &preset_style
          card:
            - background: rgba(255,255,255,0.04)
            - border-radius: 16px
            - padding: 16px 4px 12px
            - border: 1px solid rgba(255,255,255,0.06)
            - transition: all 0.3s ease
          icon:
            - color: rgba(255,255,255,0.55)
            - width: 26px
          name:
            - font-size: 9.5px
            - color: rgba(255,255,255,0.35)
            - margin-top: 8px
            - font-weight: 500

      - type: custom:button-card
        entity: button.DEVICE_zero_gravity
        icon: mdi:yoga
        name: Zero-G
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        styles: *preset_style

      - type: custom:button-card
        entity: button.DEVICE_relax
        icon: mdi:sofa-outline
        name: Relax
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        styles: *preset_style

      - type: custom:button-card
        entity: button.DEVICE_ascent
        icon: mdi:seat-recline-extra
        name: Ascent
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        styles: *preset_style

      - type: custom:button-card
        entity: button.DEVICE_anti_snore
        icon: mdi:sleep
        name: Snore
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        styles: *preset_style

  # ═══════════════════════════════════════════════
  #  POSITION SLIDERS
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    name: POSITION
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 24px 16px 6px 16px
      name:
        - font-size: 10px
        - font-weight: 600
        - color: rgba(255,255,255,0.2)
        - letter-spacing: 3px
        - text-transform: uppercase
        - text-align: left

  - type: entities
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.025);
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.04);
          margin: 0 4px;
          overflow: hidden;
          --paper-item-icon-color: rgba(100,160,255,0.6);
        }
    entities:
      - entity: number.DEVICE_head_position
        name: Head
        icon: mdi:arrow-up-bold
      - entity: number.DEVICE_foot_position
        name: Foot
        icon: mdi:arrow-down-bold
      - entity: number.DEVICE_core_position
        name: Core
        icon: mdi:human-male-height-variant

  # ═══════════════════════════════════════════════
  #  MEMORY POSITIONS
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    name: MEMORY
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 24px 16px 6px 16px
      name:
        - font-size: 10px
        - font-weight: 600
        - color: rgba(255,255,255,0.2)
        - letter-spacing: 3px
        - text-transform: uppercase
        - text-align: left

  - type: grid
    columns: 4
    square: false
    card_mod:
      style: |
        ha-card {
          background: transparent;
          box-shadow: none;
          padding: 0 4px;
        }
    cards:
      - type: custom:button-card
        entity: button.DEVICE_memory_1
        icon: mdi:numeric-1-circle-outline
        name: Mem 1
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        hold_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.DEVICE_save_memory_1
          haptic: heavy
          confirmation:
            text: Save current position to Memory 1?
        styles: &memory_style
          card:
            - background: rgba(255,255,255,0.04)
            - border-radius: 16px
            - padding: 16px 4px 12px
            - border: 1px solid rgba(255,255,255,0.06)
            - transition: all 0.3s ease
          icon:
            - color: rgba(100,160,255,0.55)
            - width: 26px
          name:
            - font-size: 9.5px
            - color: rgba(255,255,255,0.35)
            - margin-top: 8px
            - font-weight: 500

      - type: custom:button-card
        entity: button.DEVICE_memory_2
        icon: mdi:numeric-2-circle-outline
        name: Mem 2
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        hold_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.DEVICE_save_memory_2
          haptic: heavy
          confirmation:
            text: Save current position to Memory 2?
        styles: *memory_style

      - type: custom:button-card
        entity: button.DEVICE_memory_3
        icon: mdi:numeric-3-circle-outline
        name: Mem 3
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        hold_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.DEVICE_save_memory_3
          haptic: heavy
          confirmation:
            text: Save current position to Memory 3?
        styles: *memory_style

      - type: custom:button-card
        entity: button.DEVICE_memory_4
        icon: mdi:numeric-4-circle-outline
        name: Mem 4
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        hold_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.DEVICE_save_memory_4
          haptic: heavy
          confirmation:
            text: Save current position to Memory 4?
        styles: *memory_style

  # (tap = recall, hold = save with confirmation)

  # ═══════════════════════════════════════════════
  #  LIGHTING
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    name: LIGHTING
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 24px 16px 6px 16px
      name:
        - font-size: 10px
        - font-weight: 600
        - color: rgba(255,255,255,0.2)
        - letter-spacing: 3px
        - text-transform: uppercase
        - text-align: left

  - type: custom:mushroom-light-card
    entity: light.DEVICE_bed_light
    name: Bed Light
    icon: mdi:led-strip-variant
    show_brightness_control: true
    show_color_control: true
    use_light_color: true
    layout: horizontal
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.025);
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.04);
          margin: 0 4px;
        }

  # Color quick-pick dots (matches the 7 hardware colors)
  - type: grid
    columns: 7
    square: false
    card_mod:
      style: |
        ha-card {
          background: transparent;
          box-shadow: none;
          padding: 8px 12px 0;
        }
    cards:
      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action: &color_tap
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [255, 255, 255]
        styles: &color_dot_style
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(255,255,255)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(255,255,255,0.4))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [255, 0, 0]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(255,50,50)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(255,50,50,0.5))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [255, 165, 0]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(255,165,30)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(255,165,30,0.5))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [255, 255, 0]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(255,255,50)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(255,255,50,0.4))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [0, 255, 0]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(50,255,80)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(50,255,80,0.5))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [0, 0, 255]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(60,80,255)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(60,80,255,0.5))

      - type: custom:button-card
        icon: mdi:circle
        name: " "
        show_state: false
        tap_action:
          action: call-service
          service: light.turn_on
          haptic: light
          service_data:
            entity_id: light.DEVICE_bed_light
            rgb_color: [128, 0, 128]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 8px 0
            - border: none
          icon:
            - color: rgb(170,60,210)
            - width: 22px
            - filter: drop-shadow(0 0 6px rgba(170,60,210,0.5))

  # — Motion Sensor Toggle —
  - type: custom:mushroom-entity-card
    entity: switch.DEVICE_motion_sensor
    name: Motion Sensor
    icon: mdi:motion-sensor
    layout: horizontal
    tap_action:
      action: toggle
      haptic: medium
    card_mod:
      style: |
        ha-card {
          background: rgba(255,255,255,0.025);
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,0.04);
          margin: 8px 4px 0;
        }

  # ═══════════════════════════════════════════════
  #  MASSAGE
  # ═══════════════════════════════════════════════

  - type: custom:button-card
    name: MASSAGE
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 24px 16px 6px 16px
      name:
        - font-size: 10px
        - font-weight: 600
        - color: rgba(255,255,255,0.2)
        - letter-spacing: 3px
        - text-transform: uppercase
        - text-align: left

  # Massage power + mode buttons
  - type: grid
    columns: 5
    square: false
    card_mod:
      style: |
        ha-card {
          background: transparent;
          box-shadow: none;
          padding: 0 4px;
        }
    cards:

      # Power toggle
      - type: custom:button-card
        entity: switch.DEVICE_massage
        icon: mdi:power
        name: Power
        show_state: false
        tap_action:
          action: toggle
          haptic: medium
        state:
          - value: "on"
            styles:
              card:
                - background: rgba(167,139,250,0.12)
                - border-color: rgba(167,139,250,0.25)
              icon:
                - color: "#a78bfa"
                - filter: drop-shadow(0 0 8px rgba(167,139,250,0.4))
              name:
                - color: rgba(167,139,250,0.8)
          - value: "off"
            styles:
              card:
                - background: rgba(255,255,255,0.04)
                - border-color: rgba(255,255,255,0.06)
              icon:
                - color: rgba(255,255,255,0.35)
              name:
                - color: rgba(255,255,255,0.3)
        styles: &massage_btn_style
          card:
            - border-radius: 16px
            - padding: 14px 4px 10px
            - border: 1px solid
            - transition: all 0.3s ease
          icon:
            - width: 24px
            - transition: all 0.3s ease
          name:
            - font-size: 9.5px
            - margin-top: 6px
            - font-weight: 500

      # Wave 1
      - type: custom:button-card
        entity: select.DEVICE_massage_mode
        icon: mdi:wave
        name: Wave 1
        show_state: false
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.DEVICE_massage_mode
            option: "Wave 1"
          haptic: medium
        state:
          - operator: template
            value: |
              [[[ return entity.state === 'Wave 1' ]]]
            styles: &massage_active
              card:
                - background: rgba(167,139,250,0.12)
                - border-color: rgba(167,139,250,0.25)
              icon:
                - color: "#a78bfa"
              name:
                - color: rgba(167,139,250,0.8)
          - operator: default
            styles: &massage_inactive
              card:
                - background: rgba(255,255,255,0.04)
                - border-color: rgba(255,255,255,0.06)
              icon:
                - color: rgba(255,255,255,0.4)
              name:
                - color: rgba(255,255,255,0.3)
        styles: *massage_btn_style

      # Wave 2
      - type: custom:button-card
        entity: select.DEVICE_massage_mode
        icon: mdi:pulse
        name: Wave 2
        show_state: false
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.DEVICE_massage_mode
            option: "Wave 2"
          haptic: medium
        state:
          - operator: template
            value: |
              [[[ return entity.state === 'Wave 2' ]]]
            styles: *massage_active
          - operator: default
            styles: *massage_inactive
        styles: *massage_btn_style

      # Wave 3
      - type: custom:button-card
        entity: select.DEVICE_massage_mode
        icon: mdi:sine-wave
        name: Wave 3
        show_state: false
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.DEVICE_massage_mode
            option: "Wave 3"
          haptic: medium
        state:
          - operator: template
